<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SendMe - Quick Help, No Stress</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='uploads/SendMe_logo.png') }}">
    <meta name="theme-color" content="#0F172A">
</head>
<body>
    <div id="app">
        <div id="loadingScreen" class="loading-screen">
            <div class="loading-content">
                <img src="{{ url_for('static', filename='uploads/SendMe_logo.png') }}" alt="SendMe" class="loading-logo">
                <div class="loading-spinner"></div>
                <p>Loading SendMe...</p>
            </div>
        </div>
        
        <div id="appContent" style="display: none;">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
